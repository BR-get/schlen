        .error-page {

            to {

        .error-code {

        @keyframes bounce {

            height: 100%;
            top: 0;
            left: 0;

        }
        
        .island-float {

            font-size: 2em;

            top: 10%;
            left: 10%;
            animation: float-1 6s ease-in-out infinite;
        }
        
        .island-float:nth-child(2) {
            top: 20%;
            right: 15%;
            animation: float-2 8s ease-in-out infinite;
        }
        
        .island-float:nth-child(3) {
            bottom: 20%;
            left: 15%;
            animation: float-3 7s ease-in-out infinite;

        @keyframes float-1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
