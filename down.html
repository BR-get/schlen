<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BCG1K6EZ72"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BCG1K6EZ72');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Schlen联邦共和国官方资源下载 - 国旗、文档、宣传资料等。">
    <title>下载中心 - Schlen联邦共和国</title>
    <link rel="icon" type="image/png" href="国旗.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Pacifico&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v2/dist/waline.css">
</head>

<body>
    <div id="header-root"></div>

    <main>
        <section class="page-hero">
            <div class="hero-content">
                <h2>下载中心</h2>
                <p>官方资源与文档下载</p>
            </div>
        </section>

        <section class="content-section">
            <div class="container">

                <!-- 国旗 -->
                <div class="download-section">
                    <h3>🏴 国旗</h3>
                    <div class="download-grid">
                        <div class="download-card">
                            <div class="download-icon">🏴</div>
                            <h4>国旗 PNG</h4>
                            <p>高清透明背景国旗图片</p>
                            <p class="file-info">格式：PNG | 尺寸：2000x1333px</p>
                            <a href="国旗.png" download class="btn btn-primary">下载</a>
                        </div>
                    </div>
                </div>

                <!-- Valine评论 -->
                <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
                    <h3 style="text-align: center; margin-bottom: 20px;">💬 留言</h3>
                    <div id="waline"></div>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-root"></div>
    <div id="modal-root"></div>

    <script src="components.js"></script>
    <script>
        initPage('down');
    </script>
    <script src="https://unpkg.com/@waline/client@v2/dist/waline.js"></script>
    <script>
        Waline.init({
            el: '#waline',
            serverURL: 'https://blogwaline-gamma.vercel.app',
            placeholder: '欢迎留言',
            avatar: 'wavatar',
            meta: ['nick', 'mail', 'link'],
            requiredFields: ['nick'],
            pageSize: 10,
            lang: 'zh-CN',
            highlight: true,
            wordLimit: 500,
            dark: 'html[data-theme="dark"]'
        });
    </script>

    <style>
        .download-section {
            margin-bottom: 50px;
        }

        .download-section h3 {
            color: #007BFF;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007BFF;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .download-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .download-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .download-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .download-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .download-card p {
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .file-info {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 15px !important;
        }

        .download-card .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .download-grid {
                grid-template-columns: 1fr;
            }
        }

        [data-theme="dark"] .download-section h3 {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        [data-theme="dark"] .download-card {
            background: var(--card-bg);
        }

        [data-theme="dark"] .download-card h4 {
            color: #e9ecef;
        }

        [data-theme="dark"] .download-card p {
            color: #adbac7;
        }

        [data-theme="dark"] .file-info {
            color: #8b9bb5;
        }
    </style>
</body>

</html>
